set-option -g display-time 3000
set-option -g focus-events on

run-shell 'tmux set-option -g default-shell "$(command -v fish)"'
set -g default-terminal "tmux-256color"

# Split panes vertically / horizontal
bind-key - split-window -v
bind-key / split-window -h

# Move to previous pane
bind -T prefix k select-pane -t :.-

set -g detach-on-destroy off
set -g mouse on
set -g status-position top
set -g set-clipboard on
set -g history-limit 1000000
set -g renumber-windows on
set -g automatic-rename off

set -g base-index 1
setw -g pane-base-index 1

# Remap the prefix B to A
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

bind-key x kill-pane

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'wfxr/tmux-fzf-url'

set -g @plugin 'tmux-plugins/tpm'

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

set -g allow-set-title off

set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}#{E:@catppuccin_status_date_time}"
set -g status-right-length 100

bind-key "K" display-popup -E -w 60% "sesh connect \"$(
  sesh list -i | gum filter --limit 1 --placeholder 'Pick a sesh' --prompt='⚡'
)\""

bind-key "T" run-shell "sesh connect \"$(
	sesh list | fzf-tmux -p 75%,80% \
		--no-sort --border-label ' sesh ' --prompt '⚡  ' \
		--header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
		--bind 'tab:down,btab:up' \
		--bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list)' \
		--bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t)' \
		--bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c)' \
		--bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z)' \
		--bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
		--bind 'ctrl-d:execute(tmux kill-session -t {})+change-prompt(⚡  )+reload(sesh list)'
)\""

run '~/.tmux/plugins/tpm/tpm'

set -g pane-active-border-style 'fg=brightblack,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

unbind r
bind r source-file ~/.tmux.conf
